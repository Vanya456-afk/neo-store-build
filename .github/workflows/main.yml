name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Create Clean Flutter Project
        run: |
          mkdir -p /tmp/backup
          cp lib/main.dart /tmp/backup/main.dart || echo "No main.dart yet"
          find . -maxdepth 1 ! -name '.github' ! -name '.' -exec rm -rf {} +
          flutter create . --org com.neostore --project-name neo_store --platforms=android
          rm -rf lib/main.dart
          cp /tmp/backup/main.dart lib/main.dart

      - name: Build APK
        run: flutter build apk --release

      - name: Move APK to root for easy upload
        run: cp build/app/outputs/flutter-apk/app-release.apk ./neo_store_app.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NEO-STORE-APK
          path: ./neo_store_app.apk
